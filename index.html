<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2A4A" />

    <!-- Primary meta -->
    <title>Sean Chien &amp; Suri Le · Wedding Invitation</title>
    <meta
      name="description"
      content="Sean Chien and Suri Le request the pleasure of your company as they celebrate their wedding."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sean Chien &amp; Suri Le · Save the Date" />
    <meta
      property="og:description"
      content="Sean Chien and Suri Le request the pleasure of your company as they celebrate their wedding."
    />
    <meta property="og:image" content="images/web/anhcuoi_passcard.jpg" />
    <meta property="og:image:alt" content="Wedding invitation for Sean Chien and Suri Le" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_TW" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sean Chien &amp; Suri Le · Save the Date" />
    <meta
      name="twitter:description"
      content="Please join Sean Chien and Suri Le as they begin their journey to forever."
    />
    <meta name="twitter:image" content="images/web/anhcuoi_passcard.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- crossorigin makes the stylesheet's cssRules readable so the boarding
         pass PNG/PDF export can embed the fonts (Google Fonts sends ACAO). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
